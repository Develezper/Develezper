name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Cada medianoche
  workflow_dispatch: # Permite ejecutar manualmente
  push:
    branches: [main]

jobs:
  # ── Calendario semestral + habitos (modo oscuro) ──
  semestral:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          filename: github-metrics.svg
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_display: large
          config_timezone: America/Bogota

          # Calendario isometrico semestral
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Habitos y actividad
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_habits_trim: yes

          # Fondo transparente para integrarse con el perfil
          extras_css: |
            svg { background: transparent; }

  # ── Calendario semestral + habitos (modo claro) ──
  semestral-light:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          filename: github-metrics-light.svg
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_display: large
          config_timezone: America/Bogota

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_habits_trim: yes

          extras_css: |
            svg { background: transparent; }
